<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofyan Quest 2.0</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #fbbf24;
            --bg-dark: #0f172a;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .game-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 500px;
            transition: all 0.3s ease;
        }

        /* Animasi saat salah tebak */
        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            font-weight: bold;
        }

        .input-section {
            margin: 30px 0;
        }

        input[type="number"] {
            background: #1e293b;
            border: 2px solid #475569;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.8rem;
            width: 140px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 10px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .hint-text {
            min-height: 28px;
            margin: 20px 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .history {
            margin-top: 20px;
            max-height: 120px;
            overflow-y: auto;
            text-align: left;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            font-family: monospace;
        }

        .history-item {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #94a3b8;
        }

        .badge-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .badge {
            background: #334155;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<canvas id="particles-js"></canvas>

<div class="game-card" id="main-card">
    <div class="header">
        <h1>SOFYAN QUEST</h1>
        <p>Progression: <span id="lvl-display">Level 1</span></p>
    </div>

    <div class="status-bar">
        <div>❤️ <span id="health">5</span></div>
        <div>🏆 <span id="score">0</span></div>
        <div>🥇 <span id="best">0</span></div>
    </div>

    <div class="input-section">
        <p id="range-text" style="color: #94a3b8;">Range: 1 - 20</p>
        <input type="number" id="guessInput" placeholder="?" autocomplete="off">
        <button class="btn" onclick="processGuess()" style="margin-top: 20px;">KIRIM</button>
    </div>

    <div id="hint" class="hint-text">Good luck, Sofyan!</div>

    <div class="badge-container">
        <span class="badge" id="multiplier-info">Multiplier: x1.0</span>
        <span class="badge" id="streak-info">Streak: 0</span>
    </div>

    <div class="history" id="log"></div>
    
    <button class="btn" style="background:#475569; margin-top:20px; padding:10px; font-size:0.8rem; width: auto;" onclick="resetGame()">RESET SESSION</button>
</div>

<script>
    let targetNumber;
    let currentLevel = 1;
    let health = 5;
    let score = 0;
    let streak = 0;
    let maxRange = 20;
    let highScore = localStorage.getItem('sofyanHighScore') || 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTone(freq, type, duration) {
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) { console.log("Audio not interaction-ready"); }
    }

    // Particle System
    const canvas = document.getElementById('particles-js');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                v: Math.random() * 1.5 + 0.2,
                r: Math.random() * 2.5
            });
        }
    }

    function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(148, 163, 184, 0.3)";
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
            p.y -= p.v;
            if(p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(drawParticles);
    }

    function initLevel() {
        targetNumber = Math.floor(Math.random() * maxRange) + 1;
        document.getElementById('range-text').innerText = `Range Angka: 1 - ${maxRange}`;
        document.getElementById('best').innerText = highScore;
        console.log("%c Cheat: " + targetNumber, "color: #6366f1; font-weight: bold;");
    }

    function processGuess() {
        const input = document.getElementById('guessInput');
        const card = document.getElementById('main-card');
        const val = parseInt(input.value);
        const hint = document.getElementById('hint');

        if(isNaN(val)) return;

        if(val === targetNumber) {
            // SUCCESS LOGIC
            playTone(600, 'sine', 0.1);
            setTimeout(() => playTone(800, 'sine', 0.2), 100);
            
            const pointsEarned = (health * 10) * (1 + (streak * 0.2));
            score += Math.round(pointsEarned);
            streak++;
            currentLevel++;
            maxRange += 10;
            health = 5; 
            
            hint.innerHTML = `✨ LEVEL ${currentLevel-1} CLEAR! +${Math.round(pointsEarned)} Pts`;
            hint.style.color = "var(--success)";
            
            addLog(`Lv.${currentLevel-1} Clear! Angka: ${val}`);
            initLevel();
        } else {
            // FAIL LOGIC
            playTone(150, 'square', 0.2);
            health--;
            streak = 0;
            
            // Efek guncang (Shake Effect)
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 500);

            if(val > targetNumber) {
                hint.innerText = "Terlalu TINGGI! ↓";
                hint.style.color = "var(--danger)";
            } else {
                hint.innerText = "Terlalu RENDAH! ↑";
                hint.style.color = "var(--warning)";
            }

            if(health <= 0) {
                gameOver();
                return;
            }
            addLog(`Tebakan ${val} meleset.`);
        }
        
        updateUI();
        input.value = '';
        input.focus();
    }

    function updateUI() {
        document.getElementById('health').innerText = health;
        document.getElementById('score').innerText = score;
        document.getElementById('lvl-display').innerText = `Level ${currentLevel}`;
        document.getElementById('streak-info').innerText = `Streak: ${streak}`;
        
        let mult = (1 + (streak * 0.2)).toFixed(1);
        document.getElementById('multiplier-info').innerText = `Multiplier: x${mult}`;
        
        if(score > highScore) {
            highScore = score;
            localStorage.setItem('sofyanHighScore', highScore);
            document.getElementById('best').innerText = highScore;
        }
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.prepend(item);
    }

    function gameOver() {
        playTone(100, 'sawtooth', 0.4);
        alert(`GAME OVER!\nTotal Skor: ${score}\nLevel: ${currentLevel}`);
        resetGame();
    }

    function resetGame() {
        currentLevel = 1;
        health = 5;
        score = 0;
        streak = 0;
        maxRange = 20;
        document.getElementById('log').innerHTML = '';
        document.getElementById('hint').innerText = "Game Reset. Ayo mulai!";
        document.getElementById('hint').style.color = "white";
        initLevel();
        updateUI();
    }

    window.addEventListener('resize', initParticles);
    initParticles();
    drawParticles();
    initLevel();
</script>

</body>
</html>
